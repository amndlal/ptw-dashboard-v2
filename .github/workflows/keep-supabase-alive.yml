name: Keep Supabase Alive

# Free-tier Supabase projects pause after ~7 days of inactivity, which takes
# the PTW dashboard's backend offline. This workflow pings the project daily so
# it never goes idle. It also commits a timestamp on each run, which keeps
# GitHub from auto-disabling this scheduled workflow after 60 days of no commits.

on:
  schedule:
    - cron: '0 6 * * *'   # every day at 06:00 UTC
  workflow_dispatch: {}    # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: keep-supabase-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase REST endpoint
        env:
          # Public anon key — already shipped in index.html of this public repo.
          SUPABASE_URL: https://toelhzkhdvnvqmbmlown.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvZWxoemtoZHZudnFtYm1sb3duIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzY3NzYsImV4cCI6MjA5NzQ1Mjc3Nn0.timxteWu9hvR0Qo_d6EV7XPKYPZ3ZXAvYb0uCJnvLzU
        run: |
          echo "Pinging $SUPABASE_URL ..."
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" --max-time 30 \
            "$SUPABASE_URL/rest/v1/permits?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP $code"
          cat /tmp/resp.txt
          # 2xx = healthy. Anything else means the project is unhealthy/paused.
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Supabase ping failed with HTTP $code"
            exit 1
          fi
          echo "Supabase is alive."

      - name: Record last successful ping
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last-ping.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-ping.txt
          if git diff --cached --quiet; then
            echo "No change to commit."
          else
            git commit -m "chore: keep-alive ping [skip ci]"
            git push
          fi
