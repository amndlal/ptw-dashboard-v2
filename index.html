<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contractor Management — Permit to Work System</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  :root{
    --purple:#6366f1; --purple-dark:#4f46e5; --bg:#f8fafc; --card:#ffffff;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --yellow-a:#eab308; --yellow-b:#facc15; --brown:#422006;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  #root{height:100vh}
  .app{display:flex;height:100vh;overflow:hidden}

  /* Sidebar */
  .sidebar{
    width:250px;flex-shrink:0;background:linear-gradient(160deg,var(--yellow-a),var(--yellow-b));
    color:var(--brown);display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto;
  }
  .brand{font-size:28px;font-weight:800;letter-spacing:1px;padding:6px 10px 18px;color:var(--brown)}
  .nav-item{
    display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 12px;border-radius:12px;
    cursor:pointer;font-weight:600;font-size:14px;transition:background .15s,transform .1s;color:var(--brown);
  }
  .nav-item:hover{background:rgba(66,32,6,.10)}
  .nav-item.active{background:rgba(66,32,6,.20)}
  .nav-item .badge{background:var(--brown);color:var(--yellow-b);border-radius:999px;font-size:11px;padding:2px 8px;font-weight:700;min-width:22px;text-align:center}
  .nav-sub{margin-left:12px;border-left:2px solid rgba(66,32,6,.25);padding-left:6px}
  .nav-caret{transition:transform .15s;font-size:11px;opacity:.7}
  .nav-caret.open{transform:rotate(90deg)}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .header{
    background:var(--card);border-bottom:1px solid var(--line);padding:16px 26px;
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  }
  .header h1{font-size:20px;font-weight:800}
  .header .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .header-actions{display:flex;gap:10px;align-items:center}
  .content{flex:1;overflow-y:auto;padding:22px 26px}

  /* Buttons */
  .btn{border:none;cursor:pointer;font-weight:600;font-size:13.5px;border-radius:11px;padding:10px 15px;transition:.15s;font-family:inherit}
  .btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:#fff}
  .btn-primary:hover{filter:brightness(1.07)}
  .btn-ghost{background:#eef2ff;color:var(--purple-dark)}
  .btn-ghost:hover{background:#e0e7ff}
  .btn-light{background:#f1f5f9;color:var(--ink)}
  .btn-light:hover{background:#e2e8f0}
  .btn-danger{background:#fee2e2;color:#b91c1c}
  .btn-danger:hover{background:#fecaca}
  .btn-icon{width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;padding:0;font-size:16px}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:9px}

  /* Cards + layout */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .section{margin-bottom:24px}
  .section-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .grid{display:grid;gap:14px}
  .stats-row{grid-template-columns:repeat(auto-fit,minmax(155px,1fr))}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .stat .n{font-size:28px;font-weight:800;line-height:1}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:6px;font-weight:600}
  .stat.warn{background:#fffbeb;border-color:#fde68a}
  .stat.warn .n{color:#b45309}

  /* Table */
  .table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--line);background:var(--card)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:11px 14px;text-align:left;white-space:nowrap}
  th{background:#f8fafc;color:var(--muted);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
  th:hover{color:var(--ink)}
  tbody tr{border-bottom:1px solid var(--line)}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#f8fafc}
  tr.row-expired{background:#fef2f2}
  tr.row-expired:hover{background:#fee2e2}
  tr.row-expiring{background:#fffbeb}
  tr.row-expiring:hover{background:#fef3c7}

  /* Badges */
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700}
  .st-Draft{background:#f1f5f9;color:#475569}
  .st-Submitted{background:#fef9c3;color:#a16207}
  .st-Approved{background:#dcfce7;color:#15803d}
  .st-Active{background:#dbeafe;color:#1d4ed8}
  .st-Closed{background:#fee2e2;color:#b91c1c}
  .warn-pill{background:#fef3c7;color:#b45309}
  .exp-pill{background:#fee2e2;color:#b91c1c}

  /* Search + filters */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:11px;font-size:13.5px;font-family:inherit;background:var(--card)}
  .search input:focus{outline:none;border-color:var(--purple)}
  .search .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .filters{display:flex;flex-wrap:wrap;gap:8px}
  .fpill{padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted);transition:.15s}
  .fpill:hover{border-color:var(--purple);color:var(--purple-dark)}
  .fpill.on{background:var(--purple);border-color:var(--purple);color:#fff}

  /* Contractor / area cards */
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(270px,1fr))}
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(15,23,42,.05);cursor:pointer;transition:.15s}
  .ccard:hover{box-shadow:0 6px 18px rgba(15,23,42,.10);transform:translateY(-1px)}
  .ccard h4{font-size:15px;margin-bottom:3px}
  .ccard .co{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .ccard .meta{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
  .ccard .foot{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .card-actions{display:flex;gap:6px}

  .area-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  .acard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.05);cursor:pointer;transition:.15s}
  .acard:hover{box-shadow:0 6px 18px rgba(15,23,42,.10);transform:translateY(-1px)}
  .acard .thumb{height:130px;background:#f1f5f9;position:relative;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:12px}
  .acard .abody{padding:13px 15px}
  .acard h4{font-size:15px;margin-bottom:6px}
  .acard .counts{display:flex;gap:14px;font-size:12.5px;color:var(--muted);font-weight:600}
  .mini-pin{position:absolute;width:14px;height:14px;background:var(--purple);border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 1px 4px rgba(0,0,0,.4)}

  /* Floor plan viewer */
  .fp-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .fp-toolbar{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);align-items:center;flex-wrap:wrap}
  .fp-stage{position:relative;height:560px;overflow:hidden;background:#0f172a10;cursor:grab}
  .fp-stage.dragging{cursor:grabbing}
  .fp-inner{position:absolute;top:0;left:0;transform-origin:0 0}
  .fp-img{display:block;max-width:none;user-select:none;-webkit-user-drag:none}
  .fp-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;flex-direction:column;gap:8px}
  .pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:5}
  .pin .dot{width:20px;height:20px;background:var(--purple);border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .pin .lbl{position:absolute;left:50%;top:-8px;transform:translate(-50%,-100%);background:#0f172a;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;white-space:nowrap;pointer-events:none}
  .pin .lbl:after{content:'';position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0f172a}

  /* Modal / overlay */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:34px 16px;overflow-y:auto}
  .modal{background:var(--card);border-radius:16px;width:100%;max-width:860px;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
  .modal-sm{max-width:440px}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .modal-head h3{font-size:17px;font-weight:800}
  .modal-body{padding:22px;max-height:72vh;overflow-y:auto}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}

  /* Form */
  .tabs{display:flex;gap:4px;flex-wrap:wrap;padding:0 22px;border-bottom:1px solid var(--line);background:#f8fafc}
  .tab{padding:12px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--purple-dark);border-bottom-color:var(--purple)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px;color:#334155}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;font-family:inherit;background:var(--card);color:var(--ink)
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--purple)}
  .field textarea{resize:vertical;min-height:76px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
  .check{display:flex;align-items:center;gap:9px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.12s;background:var(--card)}
  .check:hover{border-color:var(--purple)}
  .check.on{background:#eef2ff;border-color:var(--purple);color:var(--purple-dark)}
  .check input{width:16px;height:16px;accent-color:var(--purple)}

  .banner{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px}
  .banner.red{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:8px 14px;font-size:13.5px}
  .kv .k{color:var(--muted);font-weight:600}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .chip{background:#eef2ff;color:var(--purple-dark);padding:3px 9px;border-radius:8px;font-size:11.5px;font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:48px 16px;font-size:14px}
  .toast{position:fixed;bottom:22px;right:22px;background:#0f172a;color:#fff;padding:13px 18px;border-radius:11px;font-size:13.5px;font-weight:600;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}
  .charts-grid{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
  .fs-overlay{position:fixed;inset:0;background:#0f172a;z-index:150;display:flex;flex-direction:column}
  .hint{font-size:12px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const RC = window.Recharts || {};
const {
  ResponsiveContainer, BarChart, Bar, PieChart, Pie, Cell,
  XAxis, YAxis, Tooltip, Legend, CartesianGrid
} = RC;

/* ============================= imageStorage utility ============================= */
const imageStorage = {
  key: 'ptw_floor_images',
  getAll(){ try { return JSON.parse(localStorage.getItem(this.key)) || {}; } catch { return {}; } },
  get(area){ return this.getAll()[area] || null; },
  set(area, base64){ const all = this.getAll(); all[area] = base64; localStorage.setItem(this.key, JSON.stringify(all)); },
  remove(area){ const all = this.getAll(); delete all[area]; localStorage.setItem(this.key, JSON.stringify(all)); },
  fileToBase64(file){
    return new Promise((resolve, reject)=>{
      const r = new FileReader();
      r.onload = ()=>resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }
};

/* ============================= storage / data model ============================= */
const KEYS = { permits:'ptw_permits', areas:'ptw_areas', pin:'ptw_admin_pin' };
const DEFAULT_AREAS = [
  { name:'P1', parent:null }, { name:'P2', parent:null }, { name:'P3', parent:null },
  { name:'Yard', parent:null }, { name:'Offsite Yard', parent:'Yard' },
  { name:'Dach', parent:null }, { name:'General', parent:null },
];
const store = {
  loadPermits(){ try { return JSON.parse(localStorage.getItem(KEYS.permits)) || []; } catch { return []; } },
  savePermits(p){ localStorage.setItem(KEYS.permits, JSON.stringify(p)); },
  loadAreas(){ try { const a = JSON.parse(localStorage.getItem(KEYS.areas)); return (a && a.length) ? a : DEFAULT_AREAS; } catch { return DEFAULT_AREAS; } },
  saveAreas(a){ localStorage.setItem(KEYS.areas, JSON.stringify(a)); },
  getPin(){ return localStorage.getItem(KEYS.pin) || ''; },
  setPin(p){ p ? localStorage.setItem(KEYS.pin, p) : localStorage.removeItem(KEYS.pin); },
};

const WORK_TYPES = ['General','Electrical','Mechanical','Hot Work','Working at Height','Confined Space','Excavation','Plumbing','Cleaning','Inspection','Installation','Demolition'];
const STATUSES = ['Draft','Submitted','Approved','Active','Closed'];
const HAZARDS = ['Working at Height','Hot Work','Confined Space','Electrical','Chemical Exposure','Falling Objects','Moving Machinery','Noise','Manual Handling','Slips/Trips','Fire Risk','Toxic Atmosphere'];
const CONTROLS = ['Area Barricaded','Fire Watch','Gas Testing','Lockout/Tagout','Permit Displayed','Ventilation','Signage Posted','Spotter Present','Rescue Plan','Emergency Stop','First Aid On-Site','Toolbox Talk Done'];
const PPE = ['Hard Hat','Safety Glasses','Hi-Vis Vest','Safety Boots','Gloves','Ear Protection','Face Shield','Respirator','Fall Harness','Coveralls','Cut-Resistant Gloves','Face Mask'];

/* ============================= helpers ============================= */
const uid = () => 'id-' + Math.floor(performance.now()*1000).toString(36) + '-' + Math.floor(performance.now()%100000).toString(36);
let _pnCounter = 0;
function genPermitNo(existing){
  let n; let s;
  do {
    n = 10000 + Math.floor((performance.now()*7 + (_pnCounter++)*131) % 90000);
    s = 'PTW-' + n;
  } while (existing.some(p=>p.permitNo===s));
  return s;
}
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return isNaN(dt)? d : dt.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'}); }
function nowISO(){ return new Date().toISOString(); }

function expiryState(p){
  if(!p.endDate) return 'ok';
  const end = new Date(p.endDate + 'T' + (p.endTime || '23:59'));
  const now = new Date();
  if(p.status==='Closed') return 'ok';
  const diffH = (end - now)/36e5;
  if(diffH < 0) return 'expired';
  if(diffH <= 24) return 'expiring';
  return 'ok';
}
function newPermit(area){
  return {
    id: uid(), permitNo:'', status:'Draft',
    contractorName:'', company:'', contact:'', email:'', workers:1,
    description:'', location: area && area!=='Overview' ? area : '', workType:'General',
    startDate:'', endDate:'', startTime:'08:00', endTime:'17:00',
    floors:[{ floor:1, x:null, y:null }],
    hazards:[], hazardsOther:'', controls:[], controlsOther:'', ppe:[], ppeOther:'',
    supervisor:'', supervisorSig:'', safetyOfficer:'', specialInstructions:'', emergencyProc:'',
    createdAt: nowISO(), updatedAt: nowISO(),
  };
}

/* ============================= Toast ============================= */
function useToast(){
  const [msg,setMsg]=useState('');
  const show=useCallback((m)=>{ setMsg(m); setTimeout(()=>setMsg(''),2200); },[]);
  const node = <div className={'toast'+(msg?' show':'')}>{msg}</div>;
  return [show,node];
}

/* ============================= CSV export ============================= */
function exportCSV(permits, filename){
  const cols = ['permitNo','status','contractorName','company','contact','email','workers','workType','location','startDate','startTime','endDate','endTime','description','supervisor','safetyOfficer','hazards','controls','ppe'];
  const esc = v => { v = (v==null?'':Array.isArray(v)?v.join('; '):String(v)); return '"'+v.replace(/"/g,'""')+'"'; };
  const rows = [cols.join(',')].concat(permits.map(p=>cols.map(c=>esc(p[c])).join(',')));
  const csv = rows.join('\r\n');
  // Standard browser download (public static-site equivalent of quick-pages downloadFile)
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename || 'ptw-permits.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============================= AdminAuth ============================= */
function AdminAuth({ onOk, onCancel }){
  const [pin,setPin]=useState(''); const [err,setErr]=useState('');
  const submit=()=>{ if(pin===store.getPin()){ onOk(); } else { setErr('Incorrect PIN'); setPin(''); } };
  return (
    <div className="overlay" onClick={onCancel}>
      <div className="modal modal-sm" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h3>🔒 Admin Approval</h3><button className="x" onClick={onCancel}>×</button></div>
        <div className="modal-body">
          <p style={{fontSize:'13.5px',color:'var(--muted)',marginBottom:'14px'}}>Enter the admin PIN to approve this permit.</p>
          <div className="field">
            <input type="password" value={pin} autoFocus placeholder="••••"
              onChange={e=>{setPin(e.target.value);setErr('')}}
              onKeyDown={e=>e.key==='Enter'&&submit()} />
          </div>
          {err && <div style={{color:'#b91c1c',fontSize:'13px',fontWeight:600}}>{err}</div>}
        </div>
        <div className="modal-foot">
          <button className="btn btn-light" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={submit}>Approve</button>
        </div>
      </div>
    </div>
  );
}

/* ============================= Settings ============================= */
function Settings({ areas, setAreas, onClose, toast }){
  const [newArea,setNewArea]=useState(''); const [parent,setParent]=useState('');
  const [pin,setPin]=useState(store.getPin());
  const [imgs,setImgs]=useState(imageStorage.getAll());
  const topAreas = areas.filter(a=>!a.parent);

  const addArea=()=>{
    const n=newArea.trim(); if(!n) return;
    if(areas.some(a=>a.name.toLowerCase()===n.toLowerCase())){ toast('Area already exists'); return; }
    const next=[...areas,{name:n,parent:parent||null}];
    setAreas(next); store.saveAreas(next); setNewArea(''); setParent(''); toast('Area added');
  };
  const delArea=(name)=>{
    const next=areas.filter(a=>a.name!==name && a.parent!==name);
    setAreas(next); store.saveAreas(next); imageStorage.remove(name); setImgs(imageStorage.getAll()); toast('Area removed');
  };
  const uploadImg=async(area,file)=>{
    if(!file) return;
    try{ const b64=await imageStorage.fileToBase64(file); imageStorage.set(area,b64); setImgs(imageStorage.getAll()); toast('Floor plan uploaded'); }
    catch{ toast('Upload failed (image too large?)'); }
  };
  const savePin=()=>{ store.setPin(pin.trim()); toast(pin.trim()?'Admin PIN saved':'Admin PIN cleared'); };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h3>⚙️ Settings</h3><button className="x" onClick={onClose}>×</button></div>
        <div className="modal-body">
          <div className="section">
            <div className="section-title">📍 Manage Areas</div>
            <div className="toolbar">
              <input className="field" style={{flex:1,minWidth:160,marginBottom:0,padding:'10px 12px',border:'1px solid var(--line)',borderRadius:10}}
                placeholder="New area name" value={newArea} onChange={e=>setNewArea(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addArea()} />
              <select value={parent} onChange={e=>setParent(e.target.value)}

/* ============================= Floor plan pin placer (in form) ============================= */
function PinPlacer({ area, floors, setFloors }){
  const img = imageStorage.get(area);
  const stageRef = useRef(null);
  const f = floors[0] || { floor:1, x:null, y:null };
  const place=(e)=>{
    const r = stageRef.current.getBoundingClientRect();
    const x = ((e.clientX - r.left)/r.width)*100;
    const y = ((e.clientY - r.top)/r.height)*100;
    setFloors([{ ...f, x:Math.round(x*10)/10, y:Math.round(y*10)/10 }]);
  };
  if(!area) return <div className="empty">Select a Location on the Work Details tab first.</div>;
  if(!img) return <div className="empty">No floor plan uploaded for “{area}”.<br/>Add one in ⚙️ Settings to place pins.</div>;
  return (
    <div>
      <p className="hint" style={{marginBottom:10}}>Click on the floor plan to place the contractor's pin.</p>
      <div ref={stageRef} onClick={place} style={{position:'relative',border:'1px solid var(--line)',borderRadius:12,overflow:'hidden',cursor:'crosshair'}}>
        <img src={img} style={{width:'100%',display:'block'}} />
        {f.x!=null && (
          <div className="pin" style={{left:f.x+'%',top:f.y+'%'}}>
            <div className="dot"></div>
          </div>
        )}
      </div>
      {f.x!=null && <div className="hint">Pin at {f.x}%, {f.y}% · <a style={{color:'var(--purple)',cursor:'pointer'}} onClick={()=>setFloors([{...f,x:null,y:null}])}>clear</a></div>}
    </div>
  );
}

  const commit=(permit)=>{ onSave(permit); };
  const trySave=()=>{
    if(!p.contractorName.trim()){ toast('Contractor name is required'); setTab(0); return; }
    // Admin PIN gate for Approved status

    if(p.status==='Approved' && !wasApproved && store.getPin()){ setAskPin(true); return; }

/* ============================= PTW Table ============================= */
function PTWTable({ permits, onEdit, onDelete, onOpen }){
  const [sort,setSort]=useState({k:'permitNo',dir:1});
  const sorted=useMemo(()=>{
    const arr=[...permits];
    arr.sort((a,b)=>{
      let x=a[sort.k]??'', y=b[sort.k]??'';
      x=(''+x).toLowerCase(); y=(''+y).toLowerCase();
      return x<y?-1*sort.dir : x>y?1*sort.dir : 0;
    });
    return arr;
  },[permits,sort]);
  const th=(k,label)=><th onClick={()=>setSort(s=>({k,dir:s.k===k?-s.dir:1}))}>{label}{sort.k===k?(sort.dir===1?' ▲':' ▼'):''}</th>;
  if(!permits.length) return <div className="empty">No permits yet. Click “+ New Job” to create one.</div>;
  return (
    <div className="table-wrap">
      <table>
        <thead><tr>
          {th('permitNo','Permit #')}{th('contractorName','Contractor')}{th('company','Company')}
          {th('workType','Work Type')}{th('location','Location')}{th('startDate','Start')}{th('endDate','End')}
          {th('status','Status')}<th>Actions</th>
        </tr></thead>
        <tbody>
          {sorted.map(p=>{
            const ex=expiryState(p);
            return (
              <tr key={p.id} className={ex==='expired'?'row-expired':ex==='expiring'?'row-expiring':''} style={{cursor:'pointer'}} onClick={()=>onOpen(p)}>
                <td style={{fontWeight:700}}>{p.permitNo}</td>

                <td>{p.company||'—'}</td>
                <td>{p.workType}</td>
                <td>{p.location||'—'}</td>
                <td>{fmtDate(p.startDate)}</td>
                <td>{fmtDate(p.endDate)} {ex==='expired'&&<span className="pill exp-pill">Expired</span>} {ex==='expiring'&&<span className="pill warn-pill">Soon</span>}</td>
                <td><span className={'pill st-'+p.status}>{p.status}</span></td>

                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ============================= Zoomable Floor Plan (area detail) ============================= */
function FloorPlan({ area, permits, onOpenPermit, fullscreen, setFullscreen }){
  const img = imageStorage.get(area);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const drag=useRef(null);
  const stageRef=useRef(null);
  const pinned = permits.filter(p=>p.floors && p.floors[0] && p.floors[0].x!=null);

  const onWheel=(e)=>{ e.preventDefault(); const d=e.deltaY<0?0.15:-0.15; setZoom(z=>Math.min(5,Math.max(0.4,z+d))); };
  const onDown=(e)=>{ drag.current={sx:e.clientX,sy:e.clientY,px:pan.x,py:pan.y}; };
  const onMove=(e)=>{ if(!drag.current) return; setPan({x:drag.current.px+(e.clientX-drag.current.sx),y:drag.current.py+(e.clientY-drag.current.sy)}); };
  const onUp=()=>{ drag.current=null; };
  const reset=()=>{ setZoom(1); setPan({x:0,y:0}); };

  const stage = (
    <div ref={stageRef} className={'fp-stage'+(drag.current?' dragging':'')}
      onWheel={onWheel} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
      style={fullscreen?{height:'calc(100vh - 58px)',background:'#0b1220'}:null}>
      {img ? (
        <div className="fp-inner" style={{transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`}}>
          <img className="fp-img" src={img} draggable={false} />
          {pinned.map(p=>(
            <div key={p.id} className="pin" style={{left:p.floors[0].x+'%',top:p.floors[0].y+'%'}}
              onClick={e=>{e.stopPropagation();onOpenPermit(p);}} onMouseDown={e=>e.stopPropagation()}>
              <div className="lbl">{p.contractorName||p.permitNo}</div>
              <div className="dot"></div>
            </div>
          ))}
        </div>
      ) : <div className="fp-empty">🗺️<div>No floor plan for “{area}”. Upload one in ⚙️ Settings.</div></div>}
    </div>
  );

  const toolbar = (
    <div className="fp-toolbar">
      <button className="btn btn-light btn-icon" onClick={()=>setZoom(z=>Math.min(5,z+0.2))}>＋</button>
      <button className="btn btn-light btn-icon" onClick={()=>setZoom(z=>Math.max(0.4,z-0.2))}>－</button>
      <button className="btn btn-light btn-sm" onClick={reset}>Reset</button>
      <span className="hint" style={{marginLeft:4}}>Zoom {Math.round(zoom*100)}% · scroll to zoom, drag to pan</span>
      <div style={{marginLeft:'auto'}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setFullscreen(f=>!f)}>{fullscreen?'✕ Exit fullscreen':'⛶ Fullscreen'}</button>
      </div>
    </div>
  );

  if(fullscreen){
    return (
      <div className="fs-overlay">
        <div style={{background:'#fff'}}>{toolbar}</div>
        {stage}
      </div>
    );
  }
  return <div className="fp-wrap">{toolbar}{stage}</div>;
}

  const topAreas = areas.filter(a=>!a.parent);
  const subAreas = (name)=>areas.filter(a=>a.parent===name);

  const permitsInArea=(name)=>permits.filter(p=>p.location===name || subAreas(name).some(s=>s.name===p.location));
  const workersInArea=(name)=>permitsInArea(name).reduce((s,p)=>s+(parseInt(p.workers)||0),0);

  // Save / delete
  const savePermit=(p)=>{
    const now=nowISO();
    setPermits(prev=>{
      const exists=prev.some(x=>x.id===p.id);
      if(exists) return prev.map(x=>x.id===p.id?{...p,updatedAt:now}:x);
      const withNo={...p, permitNo:p.permitNo||genPermitNo(prev), createdAt:now, updatedAt:now};
      return [...prev,withNo];
    });
    setShowForm(false); setEditing(null); toast('Permit saved');
  };
  const delPermit=(p)=>{ if(!confirm('Delete permit '+p.permitNo+'?')) return; setPermits(prev=>prev.filter(x=>x.id!==p.id)); toast('Permit deleted'); };
  const openNew=()=>{ setEditing(newPermit(selected)); setShowForm(true); };
  const openEdit=(p)=>{ setDetail(null); setEditing(p); setShowForm(true); };

  // Stats
  const total=permits.length;
  const workersOnSite=permits.filter(p=>['Approved','Active'].includes(p.status)).reduce((s,p)=>s+(parseInt(p.workers)||0),0);
  const activeCount=permits.filter(p=>p.status==='Active').length;
  const expCount=permits.filter(p=>['expired','expiring'].includes(expiryState(p))).length;

  // Search + filter (overview)
  const filtered=useMemo(()=>{
    let arr=permits;
    if(search.trim()){
      const q=search.toLowerCase();
      arr=arr.filter(p=>[p.contractorName,p.company,p.workType,p.location,p.permitNo].some(v=>(v||'').toLowerCase().includes(q)));
    }
    if(filter){
      if(filter==='Expiring') arr=arr.filter(p=>expiryState(p)==='expiring');
      else if(filter==='Expired') arr=arr.filter(p=>expiryState(p)==='expired');
      else arr=arr.filter(p=>p.status===filter);
    }
    return arr;
  },[permits,search,filter]);

  const expiredList=permits.filter(p=>expiryState(p)==='expired');
  const expiringList=permits.filter(p=>expiryState(p)==='expiring');

  const NavItem=({name,count,active,onClick,children,caret,onCaret})=>(
    <div className={'nav-item'+(active?' active':'')} onClick={onClick}>
      <span style={{display:'flex',alignItems:'center',gap:6}}>
        {caret!=null && <span className={'nav-caret'+(caret?' open':'')} onClick={e=>{e.stopPropagation();onCaret();}}>▶</span>}
        {name}
      </span>
      {count!=null && <span className="badge">{count}</span>}
    </div>
  );

  return (
    <div className="app">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="brand">PTW</div>
        <NavItem name="Overview" count={total} active={selected==='Overview'} onClick={()=>{setSelected('Overview');setFullscreen(false);}} />
        <div style={{fontSize:11,fontWeight:800,opacity:.6,padding:'14px 12px 6px',textTransform:'uppercase',letterSpacing:.6}}>Areas</div>
        {topAreas.map(a=>{
          const subs=subAreas(a.name);
          return (
            <div key={a.name}>
              <NavItem name={a.name} count={workersInArea(a.name)} active={selected===a.name}
                caret={subs.length? !!expanded[a.name]: null}
                onCaret={()=>setExpanded(e=>({...e,[a.name]:!e[a.name]}))}
                onClick={()=>{setSelected(a.name);setFullscreen(false);}} />
              {subs.length>0 && expanded[a.name] && (
                <div className="nav-sub">
                  {subs.map(s=>(
                    <NavItem key={s.name} name={s.name} count={workersInArea(s.name)} active={selected===s.name}
                      onClick={()=>{setSelected(s.name);setFullscreen(false);}} />
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Main */}
      <div className="main">
        <div className="header">
          <div>
            <h1>Contractor Management</h1>
            <div className="sub">Permit to Work System{selected!=='Overview'?' · '+selected:''}</div>
          </div>
          <div className="header-actions">
            <button className="btn btn-light btn-icon" title="Settings" onClick={()=>setShowSettings(true)}>⚙️</button>
            <button className="btn btn-primary" onClick={openNew}>+ New Job</button>
          </div>
        </div>

        <div className="content">
          {/* Expiry banner */}
          {(expiredList.length>0) && (
            <div className="banner red" onClick={()=>{setSelected('Overview');setFilter('Expired');}}>
              ⛔ {expiredList.length} permit(s) have expired — click to review.
            </div>
          )}
          {(expiringList.length>0) && (
            <div className="banner" onClick={()=>{setSelected('Overview');setFilter('Expiring');}}>
              ⏳ {expiringList.length} permit(s) expiring within 24 hours — click to review.
            </div>
          )}

          {selected==='Overview' ? (
            <>
              {/* Stats */}
              <div className="section grid stats-row">
                <div className="stat"><div className="n">{total}</div><div className="l">Total Jobs</div></div>
                <div className="stat"><div className="n">{workersOnSite}</div><div className="l">Workers On-Site</div></div>
                <div className="stat"><div className="n">{activeCount}</div><div className="l">Active Permits</div></div>
                <div className="stat warn"><div className="n">{expCount}</div><div className="l">Expiring / Expired</div></div>
                <div className="stat"><div className="n">{topAreas.length}</div><div className="l">Areas</div></div>
              </div>

              {/* Analytics */}
              <Analytics permits={permits} areas={areas} />

              {/* Toolbar */}
              <div className="toolbar">
                <div className="search">
                  <span className="ico">🔍</span>
                  <input placeholder="Search name, company, work type, area, permit #…" value={search} onChange={e=>setSearch(e.target.value)} />
                </div>
                <button className="btn btn-ghost" onClick={()=>exportCSV(filter||search?filtered:permits, 'ptw-permits.csv')}>⬇ Export CSV</button>
              </div>
              <div className="filters" style={{marginBottom:16}}>
                {['Active','Draft','Submitted','Approved','Expiring','Expired','Closed'].map(f=>(
                  <div key={f} className={'fpill'+(filter===f?' on':'')} onClick={()=>setFilter(filter===f?'':f)}>{f}</div>
                ))}
                {filter && <div className="fpill" onClick={()=>setFilter('')}>✕ Clear</div>}
              </div>

              {/* Filtered grid OR table */}
              {(filter||search.trim()) ? (
                <div className="section">
                  <div className="section-title">Results ({filtered.length})</div>
                  {filtered.length? (
                    <div className="grid cards-grid">
                      {filtered.map(p=><ContractorCard key={p.id} p={p} onOpen={setDetail} onEdit={openEdit} onDelete={delPermit} />)}
                    </div>
                  ):<div className="empty">No permits match your search/filter.</div>}
                </div>
              ) : (
                <div className="section">
                  <div className="section-title">📋 All Permits</div>
                  <PTWTable permits={permits} onEdit={openEdit} onDelete={delPermit} onOpen={setDetail} />
                </div>
              )}

              {/* Area grid */}
              <div className="section">
                <div className="section-title">🗺️ Areas</div>
                <div className="grid area-grid">
                  {topAreas.map(a=>{
                    const img=imageStorage.get(a.name);
                    const inArea=permitsInArea(a.name).filter(p=>p.floors&&p.floors[0]&&p.floors[0].x!=null);
                    return (
                      <div key={a.name} className="acard" onClick={()=>setSelected(a.name)}>
                        <div className="thumb" style={img?{backgroundImage:`url(${img})`}:null}>
                          {!img && '🗺️ No floor plan'}
                          {img && inArea.map(p=><div key={p.id} className="mini-pin" style={{left:p.floors[0].x+'%',top:p.floors[0].y+'%'}} />)}
                        </div>
                        <div className="abody">
                          <h4>{a.name}</h4>
                          <div className="counts"><span>📋 {permitsInArea(a.name).length} jobs</span><span>👥 {workersInArea(a.name)} workers</span></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </>
          ) : (
            /* ===== Area detail ===== */
            <>
              <div className="section">
                <div className="section-title">🗺️ {selected} — Floor Plan</div>
                <FloorPlan area={selected} permits={permitsInArea(selected)} onOpenPermit={setDetail}
                  fullscreen={fullscreen} setFullscreen={setFullscreen} />
              </div>
              <div className="section">
                <div className="section-title">👷 Contractors in {selected} ({permitsInArea(selected).length})</div>
                {permitsInArea(selected).length? (
                  <div className="grid cards-grid">
                    {permitsInArea(selected).map(p=><ContractorCard key={p.id} p={p} onOpen={setDetail} onEdit={openEdit} onDelete={delPermit} />)}
                  </div>
                ):<div className="empty">No contractors assigned to {selected} yet.</div>}
              </div>
            </>
          )}
        </div>
      </div>

      {/* Modals */}
      {showForm && editing && <PTWForm initial={editing} areas={areas} onSave={savePermit} onClose={()=>{setShowForm(false);setEditing(null);}} toast={toast} />}
      {showSettings && <Settings areas={areas} setAreas={setAreas} onClose={()=>setShowSettings(false)} toast={toast} />}
      {detail && <PermitDetail p={detail} onClose={()=>setDetail(null)} onEdit={openEdit} />}
      {toastNode}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
